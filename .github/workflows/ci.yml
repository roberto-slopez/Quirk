name: CI

on:
  # Run only after a change lands on main (i.e. after a PR merge) — not on
  # PR open/update. Releases add their own tag-triggered workflow.
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Cheap checks first: formatting and lints that don't need the whole build.
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --no-deps

  test:
    name: Test (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run unit tests
        run: cargo test --all-features --locked

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: quirk-linux-x86_64
            binary: quirk
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: quirk-macos-aarch64
            binary: quirk
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: quirk-windows-x86_64
            binary: quirk.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "stage/${{ matrix.binary }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: stage/${{ matrix.binary }}
          if-no-files-found: error